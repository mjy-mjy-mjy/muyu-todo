name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: npm install
      - name: Run logic tests
        run: npm test
      - name: Build Windows bundles
        run: npm run tauri build
      - name: Collect portable executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts
          Copy-Item src-tauri/target/release/MuyuTodo.exe artifacts/MuyuTodo-portable.exe
          Get-ChildItem src-tauri/target/release/bundle -Recurse -Include *.exe,*.msi | Copy-Item -Destination artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: MuyuTodo-Windows
          path: artifacts/*
          if-no-files-found: error

